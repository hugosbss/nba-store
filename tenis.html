<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tênis - NBA STORE</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 0; }
    header {
      background-color: #1e1e1e;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 24px; }
    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
      justify-content: center;
    }
    .product-card {
      width: 200px;
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
    }
    .product-card img {
      width: 100%;
      height: auto;
    }
    a { text-decoration: none; color: inherit; }
  </style>
</head>
<body>

  <header>
    <div class="logo"><a href="index.html">🏀 NBA STORE</a></div>
    <div>🛒 CARRINHO</div>
  </header>

  <h2 style="text-align: center; padding-top: 20px;">Tênis de Basquete</h2>

  <section class="products">
    <div class="product-card">
      <img src="assets/imagens/tenis1.png" alt="Tênis 1">
      <h3>Tênis Jordan Zoom</h3>
      <p>R$ 699,00</p>
    </div>
    <div class="product-card">
      <img src="assets/imagens/tenis2.webp" alt="Tênis 2">
      <h3>Tênis Nike Air</h3>
      <p>R$ 799,00</p>
    </div>
  </section>

</body>
</html>
